<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartDesign - 專業室內設計 CAD 渲染系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto+Sans+TC', sans-serif; background-color: #e2e8f0; margin: 0; padding: 0; overscroll-behavior: none; overflow: hidden; }
        .canvas-bg { background-color: #cbd5e1; }
        .wall-outer { stroke: #1e293b; stroke-width: 6; fill: #ffffff; }
        .wall-outer-render { stroke: #0f172a; stroke-width: 7; fill: url(#wood-floor); filter: url(#wall-shadow); }
        .wall-inner-struct { stroke: #334155; stroke-width: 4; fill: #ffffff; cursor: move; }
        .wall-inner-render { stroke: #0f172a; stroke-width: 5; fill: #475569; filter: url(#wall-shadow); cursor: move; }
        .wall-end-cap { stroke: #1e293b; stroke-width: 1.5; }
        .pillar { fill: #0f172a; stroke: #000; stroke-width: 1; cursor: move; }
        .pillar-render { fill: #1e293b; stroke: #0f172a; stroke-width: 1.5; filter: url(#soft-shadow); cursor: move; }
        .door-arc-prof { stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 4; fill: none; }
        .door-leaf-prof { stroke: #334155; stroke-width: 3; fill: none; }
        .door-leaf-render { stroke: #78350f; stroke-width: 3.5; fill: none; }
        .window-frame { stroke: #0ea5e9; stroke-width: 6; cursor: move; }
        .window-frame-render { stroke: #38bdf8; stroke-width: 7; filter: url(#soft-shadow); cursor: move; }
        .sliding-pane { fill: #ffffff; stroke: #64748b; stroke-width: 1.5; }
        .furniture { fill: #f8fafc; stroke: #64748b; stroke-width: 1.5; cursor: move; transition: filter 0.2s; }
        .cabinet-hatch { stroke: #cbd5e1; stroke-width: 1; pointer-events: none; }
        .furniture-dimmed { opacity: 0.15; filter: grayscale(1); pointer-events: none; }
        .interact-box { fill: transparent; cursor: move; }
        .item-group:hover .furniture, .item-group:hover .wall-inner-struct { filter: drop-shadow(0 4px 6px rgba(0,0,0,0.15)); }
        .selection-box { fill: rgba(59, 130, 246, 0.05); stroke: #3b82f6; stroke-width: 1.5; stroke-dasharray: 4; pointer-events: none; }
        .rotate-handle { fill: #ffffff; stroke: #3b82f6; stroke-width: 2; cursor: crosshair; }
        .rotate-line { stroke: #3b82f6; stroke-width: 1.5; pointer-events: none; }
        .text-label { font-size: 11px; font-weight: 700; fill: #334155; text-anchor: middle; pointer-events: none; }
        .text-label-render { font-size: 11px; font-weight: 800; fill: #ffffff; text-anchor: middle; pointer-events: none; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.8)); }
        .dim-text { font-size: 10px; fill: #ef4444; font-weight: 600; text-anchor: middle; font-family: monospace; }
        .dim-line { stroke: #ef4444; stroke-width: 1; }
        #svg-canvas { transform-origin: top left; touch-action: none; }
        .grab-cursor { cursor: grab !important; }
        .grabbing-cursor { cursor: grabbing !important; }
        #mobile-sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar-open { transform: translateX(0) !important; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .palette-btn { @apply flex flex-col items-center justify-center p-2 border border-slate-200 rounded-lg bg-white hover:bg-indigo-50 hover:border-indigo-400 transition-all gap-1 text-[10px] font-bold text-slate-600 shadow-sm active:scale-95 cursor-grab; }
        @media print { .no-print { display: none !important; } body { background: white; } }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">
    <header class="bg-slate-900 h-14 flex justify-between items-center px-4 z-50 no-print shrink-0 shadow-md relative">
        <div class="flex items-center gap-3">
            <button onclick="toggleMobileSidebar()" class="md:hidden text-white p-1 hover:bg-slate-800 rounded">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <div class="bg-indigo-600 p-1.5 rounded-lg text-white shadow-lg shadow-indigo-500/20">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
            </div>
            <h1 class="text-lg font-black text-white tracking-tight">SmartDesign</h1>
        </div>
        
        <div class="flex items-center gap-2">
            <button onclick="updateMode('furniture')" id="btn-mode-furn" class="px-2.5 py-1 rounded bg-indigo-600 text-white text-[10px] font-bold shadow">配置圖</button>
            <button onclick="updateMode('construction')" id="btn-mode-cons" class="px-2.5 py-1 rounded bg-slate-800 text-slate-300 text-[10px] font-bold border border-slate-700">施工圖</button>
            <button onclick="updateMode('render')" id="btn-mode-rend" class="px-2.5 py-1 rounded bg-slate-800 text-emerald-400 text-[10px] font-bold border border-slate-700">彩色預染</button>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden relative">
        <div id="sidebar-overlay" onclick="toggleMobileSidebar()" class="md:hidden absolute inset-0 bg-slate-900/50 backdrop-blur-[2px] z-40 opacity-0 pointer-events-none transition-opacity"></div>

        <aside id="mobile-sidebar" class="absolute md:relative inset-y-0 left-0 w-[280px] sm:w-80 bg-white border-r border-slate-200 flex flex-col z-50 -translate-x-full md:translate-x-0 shadow-2xl md:shadow-none">
            <div class="flex border-b text-center sticky top-0 bg-white z-10 shrink-0">
                <button onclick="switchTab('layout')" id="tab-layout" class="flex-1 py-3 text-[11px] font-black border-b-2 border-indigo-600 text-indigo-600 uppercase">空間</button>
                <button onclick="switchTab('library')" id="tab-library" class="flex-1 py-3 text-[11px] font-black border-b-2 border-transparent text-slate-400 uppercase">圖庫</button>
                <button onclick="switchTab('ai')" id="tab-ai" class="flex-1 py-3 text-[11px] font-black border-b-2 border-transparent text-slate-400 uppercase">AI</button>
            </div>

            <div class="flex-1 overflow-y-auto relative">
                <div id="panel-layout" class="p-4 space-y-6">
                    <section class="space-y-3">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest block">空間形狀</label>
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="updateShape('rect')" id="btn-rect" class="p-2 border-2 rounded-xl border-indigo-600 bg-indigo-50 text-indigo-700 font-bold text-[10px]">矩形</button>
                            <button onclick="updateShape('l-shape')" id="btn-l-shape" class="p-2 border-2 border-slate-100 rounded-xl text-slate-500 font-bold text-[10px] hover:bg-slate-50">L 型</button>
                        </div>
                    </section>
                    <section class="space-y-3">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest block">主尺寸設定 (cm)</label>
                        <div class="grid grid-cols-2 gap-3">
                            <div class="space-y-1"><span class="text-[9px] font-bold text-slate-400">總寬 W1</span><input type="number" id="num-w1" value="1100" class="w-full p-2 bg-slate-50 border rounded-lg text-sm font-mono outline-none focus:border-indigo-400"></div>
                            <div class="space-y-1"><span class="text-[9px] font-bold text-slate-400">總深 H1</span><input type="number" id="num-h1" value="850" class="w-full p-2 bg-slate-50 border rounded-lg text-sm font-mono outline-none focus:border-indigo-400"></div>
                        </div>
                    </section>
                    <section class="space-y-3 border-t pt-4">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest block">底圖描繪輔助</label>
                        <input type="file" id="ref-upload" accept="image/*" class="hidden" onchange="handleRefUpload(event)">
                        <button onclick="document.getElementById('ref-upload').click()" class="w-full py-2 bg-white text-indigo-600 font-bold text-[10px] rounded-lg border border-indigo-200 hover:bg-indigo-50 shadow-sm">上傳平面底圖</button>
                        <div id="ref-controls" class="hidden space-y-3 mt-3 p-3 bg-slate-50 rounded-lg border border-slate-100">
                            <div class="flex justify-between text-[9px] font-bold text-slate-500"><span>透明度</span><span id="ref-opacity-val">50%</span></div>
                            <input type="range" id="ref-opacity" min="0" max="100" value="50" oninput="updateRefImg()" class="w-full accent-indigo-600">
                            <div class="grid grid-cols-2 gap-2 pt-2">
                                <div><span class="text-[8px] text-slate-400">底圖寬</span><input type="number" id="ref-w" value="800" oninput="updateRefImg()" class="w-full p-1.5 border rounded text-xs font-mono"></div>
                                <div><span class="text-[8px] text-slate-400">底圖高</span><input type="number" id="ref-h" value="600" oninput="updateRefImg()" class="w-full p-1.5 border rounded text-xs font-mono"></div>
                            </div>
                            <but
